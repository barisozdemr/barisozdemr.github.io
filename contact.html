<div class="contact-container">

<h2>Detaylı İletişim Formu</h2>

<form>

<label for="name">Ad Soyad:</label>
<input type="text" id="name" placeholder="Ad Soyad">

<label for="email">E-posta Adresi:</label>
<input type="email" id="email" placeholder="ornek@mail.com">

<label for="password">Başvuru Takip Şifresi:</label>
<input type="password" id="password" placeholder="şifrenizi girin">

<label>İletişim Tercihi:</label>

<div class="radio-group">
<input type="radio" name="contactType"> Bana e-posta ile ulaşın <br>
<input type="radio" name="contactType"> Bana telefonla ulaşın
</div>

<label>İlgi Alanları / Yetenekler:</label>

<div class="checkbox-group">
<input type="checkbox"> HTML <br>
<input type="checkbox"> CSS <br>
<input type="checkbox"> Algoritma
</div>

<label for="subject">Konu:</label>

<select id="subject">
<option>Lütfen bir konu seçin...</option>
<option>İş Teklifi</option>
<option>Soru</option>
<option>Geri Bildirim</option>
</select>

<label>Özgeçmiş (CV) veya Fotoğraf Yükle:</label>

<input type="file">

<label for="message">Mesajınız:</label>

<textarea id="message" rows="5" placeholder="Detaylı mesajınızı buraya yazabilirsiniz..."></textarea>

<div class="buttons">

<button type="submit" class="send">Gönder</button>

<button type="reset" class="reset">Temizle</button>

</div>

</form>

</div>
